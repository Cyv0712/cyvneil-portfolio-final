<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cyvneil Gleine Enriquez — Full Stack Developer based in Cebu City, Philippines. Building pixel-perfect interfaces backed by clean, reliable engineering." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Cyvneil Enriquez</title>

    <!-- Preconnect to Google Fonts origins for faster DNS resolution -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Blocking font load (display=block prevents FOUT / font snapping flash) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=block"
    />

    <!-- Prevent white flash on initial load by forcing dark background immediately -->
    <style>
      html, body {
        background-color: #000000;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
