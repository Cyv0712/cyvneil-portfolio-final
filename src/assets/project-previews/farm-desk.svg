<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="100%" height="100%">
  <!-- Background panel color -->
  <rect width="1200" height="675" fill="#f8fafc" />

  <!-- LEFT SIDEBAR -->
  <rect width="240" height="675" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  
  <!-- Sidebar Header: Farmtri Logo -->
  <g transform="translate(24, 40)">
    <!-- Leaf icon -->
    <path d="M 0,0 C 15,-15 30,-5 30,15 C 30,15 15,15 0,0" fill="#22c55e" />
    <path d="M 0,0 C -15,-15 -30,-5 -30,15 C -30,15 -15,15 0,0" fill="#15803d" />
    <text x="38" y="10" font-family="'Inter', sans-serif" font-weight="900" font-size="18" fill="#0f172a">farmtri <tspan fill="#22c55e">AI</tspan></text>
  </g>

  <!-- Sidebar Menu Items -->
  <g transform="translate(12, 100)" font-family="'Inter', sans-serif" font-size="12.5" font-weight="600" fill="#475569">
    <!-- Active Dashboard item -->
    <rect x="0" y="0" width="216" height="40" rx="8" fill="#22c55e" />
    <!-- Grid icon inside item -->
    <rect x="16" y="13" width="5" height="5" rx="1.5" fill="#ffffff" />
    <rect x="23" y="13" width="5" height="5" rx="1.5" fill="#ffffff" />
    <rect x="16" y="20" width="5" height="5" rx="1.5" fill="#ffffff" />
    <rect x="23" y="20" width="5" height="5" rx="1.5" fill="#ffffff" />
    <text x="40" y="25" fill="#ffffff">Dashboard</text>

    <!-- Farmers Item -->
    <g transform="translate(0, 50)">
      <circle cx="21" cy="20" r="3" fill="#64748b" />
      <text x="40" y="24" fill="#1e293b">Farmers</text>
      <text x="190" y="24" fill="#64748b">▾</text>
      
      <!-- Submenus -->
      <g transform="translate(20, 36)" font-weight="500" font-size="11.5" fill="#64748b">
        <text x="20" y="15">Directory</text>
        <text x="20" y="40">Manage Invites</text>
      </g>
    </g>

    <!-- Other items -->
    <g transform="translate(0, 150)">
      <text x="40" y="20">Inventory</text>
      <text x="40" y="55">Messages</text>
      <text x="40" y="90">Settings</text>
    </g>
  </g>

  <!-- Sidebar Bottom Pro Panel -->
  <g transform="translate(16, 480)">
    <rect width="208" height="150" rx="16" fill="url(#pro-grad)" />
    <defs>
      <linearGradient id="pro-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#22c55e" />
        <stop offset="100%" stop-color="#15803d" />
      </linearGradient>
    </defs>
    <!-- Card content -->
    <circle cx="104" cy="40" r="22" fill="#ffffff" fill-opacity="0.2" />
    <!-- Small leaf -->
    <path d="M 104,28 Q 114,35 104,48 Q 94,35 104,28" fill="#ffffff" />
    
    <text x="104" y="85" font-family="'Inter', sans-serif" font-weight="800" font-size="12.5" fill="#ffffff" text-anchor="middle">Farm Desk Pro</text>
    <text x="104" y="102" font-family="'Inter', sans-serif" font-weight="500" font-size="9.5" fill="#ffffff" fill-opacity="0.8" text-anchor="middle">Get access to advanced</text>
    <text x="104" y="114" font-family="'Inter', sans-serif" font-weight="500" font-size="9.5" fill="#ffffff" fill-opacity="0.8" text-anchor="middle">insights on your produce</text>
    
    <rect x="28" y="125" width="152" height="28" rx="14" fill="#ffffff" />
    <text x="104" y="142" font-family="'Inter', sans-serif" font-weight="700" font-size="10.5" fill="#15803d" text-anchor="middle">Get Pro</text>
  </g>

  <!-- MAIN DASHBOARD CONTENT AREA -->
  <g transform="translate(240, 0)">
    <!-- Top Header Bar -->
    <rect width="960" height="75" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
    <text x="40" y="44" font-family="'Inter', sans-serif" font-weight="800" font-size="20" fill="#0f172a">Dashboard</text>
    
    <!-- Header Right Actions -->
    <g transform="translate(920, 42)" text-anchor="end" font-family="'Inter', sans-serif" font-size="11.5" font-weight="600" fill="#475569">
      <!-- Language -->
      <text x="-90" y="0">English ▾</text>
      <!-- Notifications -->
      <circle cx="-50" cy="-4" r="7" fill="none" stroke="#475569" stroke-width="1.5" />
      <circle cx="-47" cy="-9" r="4.5" fill="#ef4444" />
      <text x="-47" y="-7" font-size="7" font-weight="800" fill="#ffffff" text-anchor="middle">1</text>
      
      <!-- Profile -->
      <circle cx="0" cy="-4" r="14" fill="#e2e8f0" />
      <!-- Initials or avatar -->
      <text x="0" y="0" font-size="9" font-weight="800" fill="#475569" text-anchor="middle">IA</text>
    </g>

    <!-- Filters Row -->
    <g transform="translate(40, 100)" font-family="'Inter', sans-serif" font-size="11.5" font-weight="600" fill="#475569">
      <text x="0" y="18" font-size="11" font-weight="500" fill="#94a3b8">Year</text>
      <rect x="36" y="0" width="70" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
      <text x="46" y="17" fill="#0f172a">2026 ▾</text>

      <text x="130" y="18" font-size="11" font-weight="500" fill="#94a3b8">Month</text>
      <rect x="175" y="0" width="85" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
      <text x="185" y="17" fill="#0f172a">March ▾</text>

      <rect x="280" y="0" width="95" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
      <text x="290" y="17" fill="#0f172a">All Crops ▾</text>

      <rect x="390" y="0" width="85" height="26" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
      <text x="402" y="17" fill="#475569">Export ▾</text>
    </g>

    <!-- STATS CARDS GRID -->
    <g transform="translate(40, 150)">
      <!-- Card 1: Yield -->
      <g transform="translate(0, 0)">
        <rect width="200" height="120" rx="12" fill="#fdf2f8" stroke="#fbcfe8" stroke-width="1" />
        <circle cx="36" cy="36" r="16" fill="#fbcfe8" />
        <!-- Graph Bar SVG -->
        <rect x="28" y="27" width="4" height="12" fill="#db2777" />
        <rect x="34" y="24" width="4" height="15" fill="#db2777" />
        <rect x="40" y="30" width="4" height="9" fill="#db2777" />
        
        <text x="24" y="78" font-family="'Inter', sans-serif" font-weight="900" font-size="20" fill="#9d174d">4.8 kg/ha</text>
        <text x="24" y="96" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#c2185b">Ave. Yield</text>
        <text x="24" y="110" font-family="'Inter', sans-serif" font-weight="500" font-size="9" fill="#db2777">+8% from last month</text>
      </g>

      <!-- Card 2: Harvest -->
      <g transform="translate(220, 0)">
        <rect width="200" height="120" rx="12" fill="#fff7ed" stroke="#ffedd5" stroke-width="1" />
        <circle cx="36" cy="36" r="16" fill="#ffedd5" />
        <!-- Package icon -->
        <rect x="29" y="29" width="14" height="12" fill="none" stroke="#ea580c" stroke-width="2" />
        <path d="M29,29 L36,34 L43,29" fill="none" stroke="#ea580c" stroke-width="1.5" />

        <text x="24" y="78" font-family="'Inter', sans-serif" font-weight="900" font-size="20" fill="#9a3412">240 kg</text>
        <text x="24" y="96" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#c2410c">Total Harvest</text>
        <text x="24" y="110" font-family="'Inter', sans-serif" font-weight="500" font-size="9" fill="#ea580c">+5% from last month</text>
      </g>

      <!-- Card 3: Acceptance -->
      <g transform="translate(440, 0)">
        <rect width="200" height="120" rx="12" fill="#f0fdf4" stroke="#dcfce7" stroke-width="1" />
        <circle cx="36" cy="36" r="16" fill="#dcfce7" />
        <!-- Tag icon -->
        <path d="M 28,38 L 34,28 M 34,28 L 44,32 L 38,42 Z" fill="none" stroke="#16a34a" stroke-width="2" />
        <circle cx="34" cy="31" r="1" fill="#16a34a" />

        <text x="24" y="78" font-family="'Inter', sans-serif" font-weight="900" font-size="20" fill="#166534">95%</text>
        <text x="24" y="96" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#15803d">Acceptance Rate</text>
        <text x="24" y="110" font-family="'Inter', sans-serif" font-weight="500" font-size="9" fill="#16a34a">+1.2% from last month</text>
      </g>

      <!-- Card 4: On-time -->
      <g transform="translate(660, 0)">
        <rect width="200" height="120" rx="12" fill="#f3e8ff" stroke="#e9d5ff" stroke-width="1" />
        <circle cx="36" cy="36" r="16" fill="#e9d5ff" />
        <!-- Clock icon -->
        <circle cx="36" cy="36" r="7" fill="none" stroke="#7e22ce" stroke-width="2" />
        <line x1="36" y1="32" x2="36" y2="36" stroke="#7e22ce" stroke-width="1.5" />
        <line x1="36" y1="36" x2="40" y2="36" stroke="#7e22ce" stroke-width="1.5" />

        <text x="24" y="78" font-family="'Inter', sans-serif" font-weight="900" font-size="20" fill="#6b21a8">87%</text>
        <text x="24" y="96" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#7e22ce">On-time Rate</text>
        <text x="24" y="110" font-family="'Inter', sans-serif" font-weight="500" font-size="9" fill="#9333ea">-1.5% from last month</text>
      </g>
    </g>

    <!-- BOTTOM CHARTS PLACEHOLDERS -->
    <g transform="translate(40, 295)" font-family="'Inter', sans-serif">
      <!-- Widget 1: Farmers Yield -->
      <rect width="400" height="180" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
      <text x="24" y="32" font-weight="800" font-size="13.5" fill="#0f172a">Farmer Yield Distribution</text>
      <!-- Simulated Empty State Icon -->
      <g transform="translate(200, 100)" text-anchor="middle">
        <rect x="-15" y="-30" width="6" height="24" fill="#f1f5f9" />
        <rect x="-5" y="-40" width="6" height="34" fill="#f1f5f9" />
        <rect x="5" y="-15" width="6" height="9" fill="#f1f5f9" />
        <text y="24" font-weight="600" font-size="11.5" fill="#94a3b8">No data yet</text>
      </g>

      <!-- Widget 2: Target vs Actual -->
      <g transform="translate(430, 0)">
        <rect width="430" height="180" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
        <text x="24" y="32" font-weight="800" font-size="13.5" fill="#0f172a">Target vs Actual Harvest Volume</text>
        <!-- Simulated Empty State Icon -->
        <g transform="translate(215, 100)" text-anchor="middle">
          <ellipse cx="0" cy="-10" rx="20" ry="10" fill="none" stroke="#f1f5f9" stroke-width="3" />
          <text y="24" font-weight="600" font-size="11.5" fill="#94a3b8">No data yet</text>
        </g>
      </g>
    </g>

    <!-- EXTRA WIDGET ROW -->
    <g transform="translate(40, 495)" font-family="'Inter', sans-serif">
      <rect width="270" height="135" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
      <text x="20" y="30" font-weight="800" font-size="12" fill="#0f172a">Average Yield per Hectare</text>
      <text x="135" y="85" font-weight="600" font-size="11" fill="#94a3b8" text-anchor="middle">No data yet</text>

      <rect x="290" width="270" height="135" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
      <text x="310" y="30" font-weight="800" font-size="12" fill="#0f172a">Top Reported Issues</text>
      <text x="425" y="85" font-weight="600" font-size="11" fill="#94a3b8" text-anchor="middle">No data yet</text>

      <rect x="580" width="280" height="135" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
      <text x="600" y="30" font-weight="800" font-size="12" fill="#0f172a">Quality Yield by Farmer</text>
      <text x="720" y="85" font-weight="600" font-size="11" fill="#94a3b8" text-anchor="middle">No data yet</text>
    </g>
  </g>
</svg>
