<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="100%" height="100%">
  <!-- Background Light Mint Green -->
  <rect width="1200" height="675" fill="#ecfdf5" />

  <!-- Grid overlay -->
  <pattern id="mint-grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <circle cx="30" cy="30" r="1.5" fill="#a7f3d0" fill-opacity="0.25" />
  </pattern>
  <rect width="1200" height="675" fill="url(#mint-grid)" />

  <!-- LOGIN CARD CONTAINER -->
  <g transform="translate(435, 87)">
    <!-- Simulated Card Drop Shadow -->
    <rect x="-8" y="8" width="346" height="490" rx="20" fill="#064e3b" fill-opacity="0.04" />
    <rect x="-4" y="4" width="338" height="490" rx="20" fill="#064e3b" fill-opacity="0.04" />
    
    <!-- Real Card Body -->
    <rect width="330" height="490" rx="18" fill="#ffffff" stroke="#e6f4ea" stroke-width="1.5" />

    <!-- Card Brand Logo -->
    <g transform="translate(165, 52)">
      <!-- Leaf Icon -->
      <path d="M 0,-15 Q 12,-26 12,-10 Q 12,5 0,10" fill="#22c55e" />
      <path d="M 0,-15 Q -12,-26 -12,-10 Q -12,5 0,10" fill="#15803d" />
      <line x1="0" y1="-15" x2="0" y2="10" stroke="#ffffff" stroke-width="1.5" />
    </g>

    <!-- Card Headline -->
    <text x="165" y="106" font-family="'Inter', -apple-system, sans-serif" font-weight="800" font-size="20" fill="#0f172a" text-anchor="middle">Welcome Back!</text>
    <text x="165" y="126" font-family="'Inter', -apple-system, sans-serif" font-weight="500" font-size="11.5" fill="#64748b" text-anchor="middle">Log in to your Farmtri Journal</text>

    <!-- FORM FIELD 1: Email Address -->
    <g transform="translate(28, 160)" font-family="'Inter', sans-serif">
      <text x="0" y="8" font-weight="600" font-size="11" fill="#475569">Email Address</text>
      <rect y="18" width="274" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
      <text x="12" y="42" font-weight="500" font-size="12.5" fill="#334155">farmer@example.com</text>
    </g>

    <!-- FORM FIELD 2: Password -->
    <g transform="translate(28, 238)" font-family="'Inter', sans-serif">
      <text x="0" y="8" font-weight="600" font-size="11" fill="#475569">Password</text>
      <rect y="18" width="274" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
      <!-- Simulated password dots -->
      <circle cx="18" cy="38" r="4.5" fill="#1e293b" />
      <circle cx="28" cy="38" r="4.5" fill="#1e293b" />
      <circle cx="38" cy="38" r="4.5" fill="#1e293b" />
      <circle cx="48" cy="38" r="4.5" fill="#1e293b" />
      <circle cx="58" cy="38" r="4.5" fill="#1e293b" />
      <circle cx="68" cy="38" r="4.5" fill="#1e293b" />
      <circle cx="78" cy="38" r="4.5" fill="#1e293b" />
      <circle cx="88" cy="38" r="4.5" fill="#1e293b" />

      <!-- Show password eye icon on the right -->
      <g transform="translate(238, 28)" stroke="#64748b" stroke-width="1.5" fill="none">
        <!-- Closed eye slash -->
        <path d="M1.5,1.5 L14.5,14.5" />
        <path d="M 1,8 C 4,4 12,4 15,8 C 12,12 4,12 1,8" />
        <circle cx="8" cy="8" r="2" />
      </g>
    </g>

    <!-- Forgot Password Link -->
    <text x="28" y="338" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#84cc16">Forgot password?</text>

    <!-- Sign In Button -->
    <g transform="translate(28, 362)">
      <rect width="274" height="42" rx="8" fill="#84cc16" />
      <text x="137" y="26" font-family="'Inter', -apple-system, sans-serif" font-weight="800" font-size="12.5" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Log In</text>
    </g>

    <!-- Signup CTA -->
    <text x="165" y="440" font-family="'Inter', sans-serif" font-weight="600" font-size="12" fill="#64748b" text-anchor="middle">Don't have an account? <tspan fill="#84cc16" font-weight="700">Sign up</tspan></text>
  </g>
</svg>
